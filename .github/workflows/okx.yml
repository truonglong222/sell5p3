name: OKX Top10 Alert

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node bot.js

      - name: Commit Cache
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add cache.json
          git commit -m "update cache" || exit 0
          git push
