name: Execute Top 3 8H Bot From External Cron

on:
  # Mở cổng nhận tín hiệu trigger kích hoạt từ trang web cron-job.org bên ngoài
  workflow_dispatch:

jobs:
  run-top3-8h-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn từ Repository
        uses: actions/checkout@v4

      - name: Khởi tạo môi trường Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cài đặt thư viện dependencies
        run: npm install

      - name: Thực thi Tập lệnh top3_8h.js
        run: node top3_8h.js

      - name: Commit & Push dữ liệu statetop3_8h.json mới về kho code
        run: |
          # Thiết lập cấu hình danh tính Git hệ thống
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Theo dõi tệp kết quả danh sách coin top tăng/giảm 8h
          git add statetop3_8h.json
          
          # Chỉ tiến hành đẩy mã nguồn lên nếu danh sách có sự thay đổi mới
          if git diff --cached --quiet; then
            echo "Không phát hiện thay đổi trong danh sách coin. Bỏ qua bước đẩy mã nguồn lên."
          else
            git commit -m "🤖 [Bot Action] Cập nhật danh sách Top 3 tăng/giảm 8h statetop3_8h.json [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi
