name: Crypto Bot Schedule

on:
  workflow_dispatch: # Lắng nghe lệnh gọi từ bên ngoài kích hoạt
    inputs:
      action_type: # Nhận diện loại hành động gửi từ web cron-job
        description: 'Nhập run_7h hoặc run_bot'
        required: true
        default: 'run_bot'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup môi trường Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cài đặt Dependencies
        run: npm install axios

      # CHỈ chạy file 7h.js nếu bên web cron-job truyền tham số "run_7h"
      - name: Chốt giá 7h sáng
        if: github.event.inputs.action_type == 'run_7h'
        run: node 7h.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      # LUÔN LUÔN chạy file bot.js ở mọi lượt kích hoạt
      - name: Chạy Bot quét tín hiệu kĩ thuật
        run: node bot.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      # Đẩy file trạng thái mới lên lại Github
      - name: Commit và Push cập nhật file trạng thái
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json sentCoins.json || true
          git commit -m "🤖 [Bot] Cập nhật file trạng thái tự động" || true
          git push origin main || true
